spring.application.name=recruit-backend
server.port=3092

spring.datasource.url=jdbc:postgresql://localhost:5432/recruit
spring.datasource.username=recruit
spring.datasource.password=recruit123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

minio.endpoint=http://localhost:9000
minio.accessKey=minioadmin
minio.secretKey=minioadmin123
minio.bucketName=resumes

parser.service.url=http://localhost:3095

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

spring.web.cors.allowed-origins=http://localhost:59090
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# RabbitMQ：Offer审批通过后异步通知人才库索引更新程序
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/
spring.rabbitmq.connection-timeout=3000
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=2000
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.missing-queues-fatal=false

# 邮件通知（默认不配置SMTP主机，邮件服务降级为日志记录；如需真实发送请配置spring.mail.host）
spring.mail.host=
spring.mail.username=noreply@recruit.com
